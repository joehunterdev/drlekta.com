<div class="vp-wrap" id="video-player">

  <!-- HTML5 video (hidden until played) -->
  <video
    class="vp-video"
    id="vp-video"
    src="/assets/video/pay-homage-music-vid.mp4"
    poster="/assets/img/pay-homage-thumb.png"
    playsinline
    preload="auto">
  </video>

  <!-- Bars overlay image -->
  <img
    class="vp-bars vp-bars--lighten"
    src="/assets/img/bars-overlay-2.png"
    alt=""
    aria-hidden="true">

  <!-- Top-right label -->
  <span class="vp-label">Unlock the Bars</span>

  <!-- Centre play button -->
  <button class="vp-play-btn" id="vp-play-btn" aria-label="Play video">
    <svg class="vp-play-icon" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="30" cy="30" r="29" stroke="white" stroke-width="1.5" stroke-dasharray="4 3"/>
      <polygon points="24,18 46,30 24,42" fill="white"/>
    </svg>
  </button>

  <!-- Custom screwdriver cursor (SVG inline so no extra request) -->
  <svg class="vp-cursor" id="vp-cursor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
    <line x1="6" y1="6" x2="26" y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="21" y="3" width="7" height="3" rx="1" transform="rotate(45 24.5 4.5)" fill="white"/>
    <polygon points="4,22 4,28 10,28" fill="white" opacity="0.7"/>
  </svg>

</div>
